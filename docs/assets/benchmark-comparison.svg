<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif">
  <defs>
    <linearGradient id="bgbench" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0E1218"/>
      <stop offset="1" stop-color="#121826"/>
    </linearGradient>
    <linearGradient id="barGPT" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#3A4252"/>
      <stop offset="1" stop-color="#5A6478"/>
    </linearGradient>
    <linearGradient id="barDet" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#5AB7E0"/>
      <stop offset="1" stop-color="#7FD5EC"/>
    </linearGradient>
    <linearGradient id="barLive" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#4EC58F"/>
      <stop offset="1" stop-color="#76DDA8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#bgbench)"/>

  <text x="600" y="50" text-anchor="middle" fill="#E8EEF5" font-size="24" font-weight="700">DFIR-Metric Module III · TUS@4 (510 questions)</text>
  <text x="600" y="76" text-anchor="middle" fill="#6FD0C9" font-size="13" font-weight="500" letter-spacing="2">NIST STRING SEARCH · K=4 CANDIDATE BUDGET</text>

  <!-- Y-axis label -->
  <text x="80" y="160" fill="#9AA6B4" font-size="11">100%</text>
  <text x="80" y="270" fill="#9AA6B4" font-size="11">75%</text>
  <text x="80" y="380" fill="#9AA6B4" font-size="11">50%</text>
  <text x="80" y="490" fill="#9AA6B4" font-size="11">25%</text>
  <text x="80" y="600" fill="#9AA6B4" font-size="11">0%</text>

  <!-- Grid lines -->
  <line x1="120" y1="155" x2="1140" y2="155" stroke="#1F2738" stroke-width="1"/>
  <line x1="120" y1="265" x2="1140" y2="265" stroke="#1F2738" stroke-width="1"/>
  <line x1="120" y1="375" x2="1140" y2="375" stroke="#1F2738" stroke-width="1"/>
  <line x1="120" y1="485" x2="1140" y2="485" stroke="#1F2738" stroke-width="1"/>
  <line x1="120" y1="595" x2="1140" y2="595" stroke="#2C3850" stroke-width="2"/>

  <!-- Bars: GPT-4.1 38.5% -->
  <g>
    <!-- Full corpus (light): 38.5% -->
    <rect x="220" y="426" width="120" height="169" fill="url(#barGPT)" rx="4"/>
    <text x="280" y="416" text-anchor="middle" fill="#E8EEF5" font-size="14" font-weight="700">38.5%</text>
    <text x="280" y="630" text-anchor="middle" fill="#D5DAE2" font-size="13" font-weight="600">GPT-4.1 baseline</text>
    <text x="280" y="650" text-anchor="middle" fill="#9AA6B4" font-size="11">DFIR-Metric paper, arXiv:2505.19973</text>
    <text x="280" y="668" text-anchor="middle" fill="#9AA6B4" font-size="11">script-generation approach</text>
  </g>

  <!-- OATH deterministic 78.43% -->
  <g>
    <rect x="500" y="250" width="120" height="345" fill="url(#barDet)" rx="4"/>
    <text x="560" y="240" text-anchor="middle" fill="#E8EEF5" font-size="14" font-weight="700">78.43%</text>
    <text x="560" y="630" text-anchor="middle" fill="#D5DAE2" font-size="13" font-weight="600">OATH deterministic</text>
    <text x="560" y="650" text-anchor="middle" fill="#9AA6B4" font-size="11">no LLM in the loop</text>
    <text x="560" y="668" text-anchor="middle" fill="#5AB7E0" font-size="11">+39.93 pts over GPT-4.1</text>
  </g>

  <!-- OATH live 92.75% -->
  <g>
    <rect x="780" y="187" width="120" height="408" fill="url(#barLive)" rx="4"/>
    <text x="840" y="177" text-anchor="middle" fill="#E8EEF5" font-size="14" font-weight="700">92.75%</text>
    <text x="840" y="630" text-anchor="middle" fill="#D5DAE2" font-size="13" font-weight="600">OATH live, Gemini 3 Flash</text>
    <text x="840" y="650" text-anchor="middle" fill="#9AA6B4" font-size="11">typed-args proposal + verifier</text>
    <text x="840" y="668" text-anchor="middle" fill="#4EC58F" font-size="11">+54.25 pts over GPT-4.1</text>
  </g>

  <!-- Hard subset overlay -->
  <g transform="translate(990,160)">
    <rect width="180" height="440" rx="10" fill="#1B2230" stroke="#6FD0C9" stroke-width="1.5" stroke-dasharray="4 4"/>
    <text x="90" y="32" text-anchor="middle" fill="#6FD0C9" font-size="13" font-weight="700" letter-spacing="1">HARDER SUBSET</text>
    <text x="90" y="50" text-anchor="middle" fill="#9AA6B4" font-size="11">227 questions where</text>
    <text x="90" y="66" text-anchor="middle" fill="#9AA6B4" font-size="11">answer ≠ empty list</text>
    <text x="90" y="100" text-anchor="middle" fill="#5AB7E0" font-size="13" font-weight="700">51.54%</text>
    <text x="90" y="118" text-anchor="middle" fill="#9AA6B4" font-size="10">deterministic</text>
    <text x="90" y="160" text-anchor="middle" fill="#4EC58F" font-size="13" font-weight="700">83.70%</text>
    <text x="90" y="178" text-anchor="middle" fill="#9AA6B4" font-size="10">Gemini 3 Flash</text>
    <line x1="20" y1="200" x2="160" y2="200" stroke="#2C3850" stroke-width="1"/>
    <text x="90" y="226" text-anchor="middle" fill="#E8EEF5" font-size="12" font-weight="600">+32.2 pts</text>
    <text x="90" y="244" text-anchor="middle" fill="#9AA6B4" font-size="10">LLM contribution</text>
    <text x="90" y="260" text-anchor="middle" fill="#9AA6B4" font-size="10">on non-empty subset</text>
    <text x="90" y="300" text-anchor="middle" fill="#6FD0C9" font-size="11" font-weight="600">honest framing</text>
    <text x="90" y="318" text-anchor="middle" fill="#9AA6B4" font-size="10">55% of full corpus</text>
    <text x="90" y="334" text-anchor="middle" fill="#9AA6B4" font-size="10">has empty-list answers</text>
    <text x="90" y="350" text-anchor="middle" fill="#9AA6B4" font-size="10">a K=4 system can claim</text>
    <text x="90" y="366" text-anchor="middle" fill="#9AA6B4" font-size="10">those by including []</text>
    <text x="90" y="400" text-anchor="middle" fill="#6FD0C9" font-size="11" font-weight="600">non-empty subset</text>
    <text x="90" y="418" text-anchor="middle" fill="#9AA6B4" font-size="10">is the architectural signal</text>
  </g>

  <!-- Footer -->
  <text x="600" y="700" text-anchor="middle" fill="#9AA6B4" font-size="11">Architecture lift alone: +39.93 pts (no LLM) · LLM contribution on hard subset: +32.2 pts · methodology: docs/ACCURACY.md</text>
</svg>
